server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/gaocui?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: 111111 #密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  mail:
    host: smtp.163.com
    port: 465
    username: asd24630@163.com #邮箱
    password: ${MAIL_PASSWORD}  #smtp
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.ssl.trust: smtp.163.com
  data:
    redis:
      host: localhost
      port: 6379
      password:

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

alipay:
  app-id: ${ALIPAY_APP_ID} #支付宝
  app-private-key: ${ALIPAY_PRIVATE_KEY}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY}
  notify-url: ${ALIPAY_NOTIFY_URL}  #内网穿透

gaocui:
  search:
    mode: mysql   # mysql / elasticsearch
  upload:
    path: ./uploads/
  elasticsearch:
    host: localhost
    port: 9200
  llm:
    deepseek-api-key: ${DEEPSEEK_API_KEY}  # 环境变量传入
    deepseek-base-url: https://api.deepseek.com
    deepseek-pro-model: deepseek-v4-pro #模型名字
    deepseek-flash-model: deepseek-v4-flash #模型名字
    qwen-api-key: ${QWEN_API_KEY}  # 环境变量传入
    qwen-base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    qwen-model: qwen-plus #模型名字
    qwen-vision-model: qwen-vl-plus
    doubao-api-key: ${ARK_API_KEY}  # 豆包API Key
    doubao-model: doubao-seed-2-0-mini-260428 #模型名字
